<div class="wrapper">
    <main>
        <h1>Contactează redacția ProSport</h1>
        <p>Ai un pont sau o întrebare? Trimite-ne un mesaj folosind formularul de mai jos.</p>
        
        <form class="contact-form">
            <label>Nume complet</label>
            <input type="text" placeholder="Ex: Popescu Ion">
            
            <label>Adresa de email</label>
            <input type="email" placeholder="nume@exemplu.com">
            
            <label>Mesajul tău</label>
            <textarea rows="6" placeholder="Scrie aici mesajul tău..."></textarea>
            
            <button type="submit" class="btn-trimite">Trimite Mesajul</button>
        </form>
    </main>
</div>
